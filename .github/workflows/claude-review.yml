name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          prompt: |
            Review this pull request as a senior engineer. Focus on:

            1. Correctness — bugs, edge cases, error handling, race conditions
            2. Security — input validation, injection (SQL/command/template),
               secrets in code, authn/authz mistakes, unsafe deserialization
            3. Test coverage — new code paths covered? regression tests for fixes?

            Skip style nits and formatting. Be concise. Group findings by severity:
            blocker / important / nit. If the PR is small or trivial, say so and stop.
